<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/signin.css" />
    <title>SignIn</title>
  </head>
  <body>
    <div class="container">
        <div class="heading">
            <h1>SignIn</h1>
        </div>
        <div class="main">
            <form id="signInForm">
                <!-- <p>Username: </p>
                <input type="text" id="userName" class="user-name" placeholder="Username"> -->
                <p>Email: </p>
                <input type="email" id="email" class="email" placeholder="E-mail">
                <p>Password: </p>
                <input type="password" id="password" class="password" placeholder="Password">
                <button id="signIn" class="signin-btn">SignIn</button>
                <p class="sign-up-status" id="signupStatus"></p>
            </form>
        </div>
        <div class="register">
            <p>Don't have a account?&nbsp;<a href="/html/signup.html">Register</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/scripts/config.js"></script>
    <script src="/scripts/signin.js"></script>
  </body>
</html>
