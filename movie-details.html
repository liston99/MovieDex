<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/movie-details.css" />
    <title>Movie Details</title>
  </head>
  <body>
    <div class="main">
      <div class="content">
        <div class="movie-image content-child">
          <img alt="Movie Poster" />
        </div>
        <div class="movie-details content-child">
          <div class="details">
            <div class="title-wrapper">
              <h2 class="movie-title"></h2>
              <p class="movie-date-genre"></p>
            </div>
            <div class="desc-wrapper">
              <p class="movie-rating"></p>
              <p class="movie-desc"></p>
              <div class="btns">
                <button class="watch-trailer-btn">Watch Trailer</button>
              </div>
            </div>
          </div>
        </div>
        <div class="cast-details">
          <div class="title">
            <h1>Cast</h1>
          </div>

          <div class="c-details"></div>
        </div>
    </div>
    <script src="/scripts/config.js"></script>
    <script src="/scripts/moviedetails.js"></script>
  </body>
</html>
